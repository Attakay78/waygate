name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  css:
    name: CSS build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Tailwind
        run: npm install

      - name: Rebuild CSS
        run: npm run build:css

      - name: Verify CSS is up-to-date
        run: |
          if ! git diff --quiet waygate/dashboard/static/waygate.min.css; then
            echo "::error::waygate.min.css is out of date. Run 'npm run build:css' locally and commit the result."
            git diff --stat waygate/dashboard/static/waygate.min.css
            exit 1
          fi

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system ruff mypy

      - name: Run ruff (lint)
        run: ruff check .

      - name: Run ruff (format check)
        run: ruff format --check .

      - name: Run mypy
        run: uv pip install --system -e ".[all,dev]" && mypy waygate

  test:
    name: Tests (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -e ".[all,dev]"

      - name: Run tests
        run: pytest --tb=short -q

  test-redis:
    name: Tests with Redis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set cache week key
        id: date
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-redis-${{ runner.os }}-${{ steps.date.outputs.week }}
          restore-keys: apt-redis-${{ runner.os }}-

      - name: Start Redis
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server
          redis-server --daemonize yes --port 6379
          redis-cli ping

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -e ".[all,dev]"

      - name: Run tests with Redis
        run: pytest --tb=short -q
        env:
          WAYGATE_REDIS_URL: redis://localhost:6379
