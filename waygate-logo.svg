<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">

  <!-- Waygate Icon -->
  <g transform="translate(40,30)">

    <!-- Gradient Circle -->
    <defs>
      <radialGradient id="gradWaygate" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#FFD580"/>
        <stop offset="100%" stop-color="#F59E0B"/>
      </radialGradient>
    </defs>
    <circle cx="80" cy="100" r="80" fill="url(#gradWaygate)"/>

    <!-- Curved switching arrows -->
    <g stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M50 80 C70 60, 90 60, 110 80" />
      <path d="M50 120 C70 140, 90 140, 110 120" />
    </g>

    <!-- Node circles -->
    <g fill="white">
      <circle cx="80" cy="50" r="7"/>
      <circle cx="50" cy="80" r="7"/>
      <circle cx="110" cy="80" r="7"/>
      <circle cx="50" cy="120" r="7"/>
      <circle cx="110" cy="120" r="7"/>
      <circle cx="80" cy="150" r="7"/>
    </g>

    <!-- Arrowheads -->
    <g fill="white">
      <polygon points="77,47 83,47 80,52"/>
      <polygon points="77,147 83,147 80,152"/>
    </g>

  </g>

  <!-- Wordmark -->
  <text
    x="240"
    y="130"
    dominant-baseline="central"
    font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
    font-size="98"
    font-weight="600"
    fill="#F59E0B"
    letter-spacing="0.5">WayGate</text>

</svg>
