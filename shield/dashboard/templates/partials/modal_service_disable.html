<div class="p-6 sm:p-7">

    {# ── Header ───────────────────────────────────────────────── #}
    <div class="flex gap-4 mb-5">
        <div class="shrink-0 w-11 h-11 rounded-xl flex items-center justify-center bg-emerald-100">
            <svg class="w-5 h-5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
        </div>
        <div class="pt-0.5">
            <h2 class="text-base font-semibold text-slate-900">
                Restore <span class="font-mono text-indigo-700">{{ service }}</span>
            </h2>
            <p class="text-sm text-slate-500 mt-0.5 leading-relaxed">
                Disable service maintenance and return routes to their individual states.
            </p>
        </div>
    </div>

    <form hx-post="{{ prefix }}/service-maintenance/disable"
          hx-target="#service-maintenance-widget"
          hx-swap="outerHTML"
          hx-on::after-request="document.getElementById('shield-modal').close()"
          class="flex flex-col gap-4">

        <input type="hidden" name="service" value="{{ service }}">

        <p class="text-sm text-slate-600 bg-slate-50 border border-slate-200 rounded-lg px-4 py-3">
            Routes for <span class="font-mono font-medium text-indigo-700">{{ service }}</span> will
            resume following their individual lifecycle states (active, maintenance, disabled, etc.).
        </p>

        <div class="flex items-center justify-end gap-2.5 pt-1">
            <button type="button"
                    onclick="document.getElementById('shield-modal').close()"
                    class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-200
                           rounded-lg hover:bg-slate-50 hover:border-slate-300
                           focus:outline-none focus:ring-2 focus:ring-slate-400
                           transition-all active:scale-95 shadow-sm">
                Cancel
            </button>
            <button type="submit"
                    class="px-4 py-2 text-sm font-semibold text-white rounded-lg
                           bg-emerald-600 hover:bg-emerald-700
                           focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2
                           transition-all active:scale-95 shadow-sm">
                Restore Service
            </button>
        </div>
    </form>
</div>
