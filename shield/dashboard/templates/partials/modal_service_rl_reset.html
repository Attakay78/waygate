<div class="p-6 sm:p-7">

    {# ── Header ─────────────────────────────────────────────────── #}
    <div class="flex gap-4 mb-6">
        <div class="shrink-0 w-11 h-11 rounded-xl flex items-center justify-center bg-sky-100">
            <svg class="w-5 h-5 text-sky-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/>
            </svg>
        </div>
        <div class="min-w-0 pt-0.5">
            <h2 class="text-base font-semibold text-slate-900">Reset <span class="font-mono text-indigo-700">{{ service }}</span> Rate Limit Counters</h2>
            <p class="text-sm text-slate-500 mt-0.5 leading-relaxed">Clears all accumulated counts for {{ service }}. The policy is kept — only the counters are cleared.</p>
        </div>
    </div>

    {# ── Confirmation form ───────────────────────────────────────── #}
    <form hx-post="{{ prefix }}/service-rl/reset"
          hx-target="#service-rl-card"
          hx-swap="outerHTML"
          hx-on::after-request="document.getElementById('shield-modal').close()">

        <input type="hidden" name="service" value="{{ service }}">

        <div class="flex items-center justify-end gap-2.5 pt-1">
            <button type="button"
                    onclick="document.getElementById('shield-modal').close()"
                    class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-200
                           rounded-lg hover:bg-slate-50 hover:border-slate-300
                           focus:outline-none focus:ring-2 focus:ring-slate-400
                           transition-all active:scale-95 shadow-sm">
                Cancel
            </button>
            <button type="submit"
                    class="px-4 py-2 text-sm font-semibold text-white rounded-lg bg-sky-600 hover:bg-sky-700
                           focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sky-500
                           transition-all active:scale-95 shadow-sm">
                Reset Counters
            </button>
        </div>
    </form>
</div>
