<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waygate — Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ prefix }}/static/waygate.min.css">
</head>
<body class="h-full bg-slate-50 antialiased flex items-center justify-center min-h-screen" style="font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;">

<div class="w-full max-w-sm px-4">

    <!-- Brand -->
    <div class="flex flex-col items-center mb-8">
        <svg class="w-14 h-[4.5rem] mb-4" viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">
            <path d="M80 15 L140 50 L140 105 C140 155 110 185 80 200 C50 185 20 155 20 105 L20 50 Z" fill="#F59E0B"/>
            <g stroke="white" stroke-width="14" stroke-linecap="round">
                <line x1="80" y1="60" x2="80" y2="100"/>
                <line x1="80" y1="100" x2="50" y2="130"/>
                <line x1="80" y1="100" x2="110" y2="130"/>
            </g>
            <g fill="white">
                <circle cx="80"  cy="55"  r="14"/>
                <circle cx="80"  cy="100" r="14"/>
                <circle cx="50"  cy="130" r="14"/>
                <circle cx="110" cy="130" r="14"/>
            </g>
        </svg>
        <h1 class="text-xl font-semibold text-slate-900">waygate</h1>
        <p class="text-sm text-slate-500 mt-1">Sign in to manage your routes</p>
    </div>

    <!-- Error banner -->
    {% if error %}
    <div class="mb-4 flex items-center gap-2 rounded-lg bg-red-950/60 border border-red-800 px-4 py-3 text-sm text-red-300">
        <svg class="w-4 h-4 shrink-0 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71
                     c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898
                     0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
        </svg>
        {{ error }}
    </div>
    {% endif %}

    <!-- Sign-in card -->
    <div class="bg-white rounded-2xl border border-slate-200 p-6">
        <form method="POST" action="{{ prefix }}/login" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-600 mb-1">
                    Username
                </label>
                <input
                    id="username"
                    name="username"
                    type="text"
                    required
                    autofocus
                    autocomplete="username"
                    class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm
                           text-slate-800 placeholder-slate-400
                           focus:border-violet-500 focus:outline-none focus:ring-1 focus:ring-violet-500
                           transition-colors"
                    placeholder="admin"
                />
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-600 mb-1">
                    Password
                </label>
                <input
                    id="password"
                    name="password"
                    type="password"
                    required
                    autocomplete="current-password"
                    class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm
                           text-slate-800 placeholder-slate-400
                           focus:border-violet-500 focus:outline-none focus:ring-1 focus:ring-violet-500
                           transition-colors"
                    placeholder="••••••••"
                />
            </div>

            <button
                type="submit"
                class="w-full rounded-lg bg-violet-700 hover:bg-violet-600 active:bg-violet-800
                       px-4 py-2.5 text-sm font-semibold text-white
                       focus:outline-none focus:ring-2 focus:ring-violet-500 focus:ring-offset-2 focus:ring-offset-white
                       transition-colors"
            >
                Sign in
            </button>
        </form>
    </div>

    <p class="mt-6 text-center text-xs text-slate-400">
        waygate v{{ version }}
    </p>
</div>

</body>
</html>
