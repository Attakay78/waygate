{% if flags %}
    {% for flag in flags %}
    {% include "partials/flag_row.html" with context %}
    {% endfor %}
{% else %}
<tr id="flags-empty-row">
    <td colspan="6" class="px-6 py-16">
        <div class="flex flex-col items-center text-center">
            <div class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center mb-4">
                <svg class="w-6 h-6 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
            </div>
            <h3 class="text-sm font-semibold text-slate-900 mb-1">No feature flags yet</h3>
            <p class="text-sm text-slate-500 max-w-xs mb-5 leading-relaxed">
                Create your first feature flag to start controlling feature rollouts and experiments.
            </p>
            <button
                hx-get="{{ prefix }}/modal/flag/create"
                hx-target="#waygate-modal"
                hx-swap="innerHTML"
                class="inline-flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white
                       bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-sm
                       focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500
                       transition-all active:scale-95">
                <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                </svg>
                Create Flag
            </button>
        </div>
    </td>
</tr>
{% endif %}
