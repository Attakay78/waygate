<div class="p-6 sm:p-7">

    {# ── Header ─────────────────────────────────────────────────── #}
    <div class="flex gap-4 mb-6">
        <div class="shrink-0 w-11 h-11 rounded-xl flex items-center justify-center bg-red-100">
            <svg class="w-5 h-5 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/>
            </svg>
        </div>
        <div class="min-w-0 pt-0.5">
            <h2 class="text-base font-semibold text-slate-900">Remove Global Rate Limit</h2>
            <p class="text-sm text-slate-500 mt-0.5 leading-relaxed">All routes will become unrestricted by the global limit. Per-route policies are unaffected.</p>
        </div>
    </div>

    {# ── Confirmation form ───────────────────────────────────────── #}
    <form hx-post="{{ prefix }}/global-rl/delete"
          hx-target="#global-rl-card"
          hx-swap="outerHTML"
          hx-on::after-request="document.getElementById('waygate-modal').close()">

        <div class="flex items-center justify-end gap-2.5 pt-1">
            <button type="button"
                    onclick="document.getElementById('waygate-modal').close()"
                    class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-200
                           rounded-lg hover:bg-slate-50 hover:border-slate-300
                           focus:outline-none focus:ring-2 focus:ring-slate-400
                           transition-all active:scale-95 shadow-sm">
                Cancel
            </button>
            <button type="submit"
                    class="px-4 py-2 text-sm font-semibold text-white rounded-lg bg-red-600 hover:bg-red-700
                           focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500
                           transition-all active:scale-95 shadow-sm">
                Remove
            </button>
        </div>
    </form>
</div>
