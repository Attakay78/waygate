{% if segments %}
    {% for segment in segments %}
    {% include "partials/segment_row.html" with context %}
    {% endfor %}
{% else %}
<tr id="segments-empty-row">
    <td colspan="6" class="px-6 py-16">
        <div class="flex flex-col items-center text-center">
            <div class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center mb-4">
                <svg class="w-6 h-6 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
            </div>
            <h3 class="text-sm font-semibold text-slate-900 mb-1">No segments yet</h3>
            <p class="text-sm text-slate-500 max-w-xs mb-5 leading-relaxed">
                Create segments to group users and use them in feature flag targeting rules.
            </p>
            <button
                hx-get="{{ prefix }}/modal/segment/create"
                hx-target="#waygate-modal"
                hx-swap="innerHTML"
                class="inline-flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white
                       bg-violet-700 hover:bg-violet-600 rounded-lg shadow-sm
                       focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-violet-600
                       transition-all active:scale-95">
                <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                </svg>
                Create Segment
            </button>
        </div>
    </td>
</tr>
{% endif %}
