<div class="p-6 sm:p-7">

    {# ── Header ──────────────────────────────────────────────────────── #}
    <div class="flex items-start gap-4 mb-6">
        <div class="shrink-0 w-10 h-10 rounded-xl flex items-center justify-center bg-indigo-100">
            <svg class="w-5 h-5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
        </div>
        <div class="min-w-0">
            <h2 class="text-base font-semibold text-slate-900 leading-tight">Create Segment</h2>
            <p class="text-sm text-slate-500 mt-0.5">Group users to use in flag targeting rules.</p>
        </div>
        <button type="button"
                onclick="document.getElementById('waygate-modal').close()"
                class="shrink-0 ml-auto -mr-1 p-1 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-md transition-colors">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>

    {# ── Form ────────────────────────────────────────────────────────── #}
    <form hx-post="{{ prefix }}/segments/create"
          hx-target="#segment-table-body"
          hx-swap="afterbegin">

        <div class="space-y-4">
            {# Key #}
            <div>
                <label for="seg-create-key"
                       class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">
                    Key <span class="text-red-500">*</span>
                </label>
                <input id="seg-create-key"
                       type="text"
                       name="key"
                       required
                       autofocus
                       autocomplete="off"
                       pattern="[a-z][a-z0-9_\-]*"
                       placeholder="beta_users"
                       class="w-full text-sm rounded-lg px-3 py-2.5 text-slate-800 font-mono
                              placeholder:text-slate-400 border border-slate-300 bg-white shadow-sm
                              focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400
                              transition-shadow">
                <p class="mt-1 text-xs text-slate-400">Lowercase letters, digits, hyphens, and underscores.</p>
            </div>

            {# Name #}
            <div>
                <label for="seg-create-name"
                       class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">
                    Name <span class="text-red-500">*</span>
                </label>
                <input id="seg-create-name"
                       type="text"
                       name="name"
                       required
                       autocomplete="off"
                       placeholder="Beta Users"
                       class="w-full text-sm rounded-lg px-3 py-2.5 text-slate-800
                              placeholder:text-slate-400 border border-slate-300 bg-white shadow-sm
                              focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400
                              transition-shadow">
            </div>
        </div>

        <div class="flex items-center justify-end gap-2.5 mt-6">
            <button type="button"
                    onclick="document.getElementById('waygate-modal').close()"
                    class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-200
                           rounded-lg hover:bg-slate-50 hover:border-slate-300
                           focus:outline-none focus:ring-2 focus:ring-slate-300
                           transition-all active:scale-95 shadow-sm">
                Cancel
            </button>
            <button type="submit"
                    class="px-5 py-2 text-sm font-semibold text-white rounded-lg bg-violet-700 hover:bg-violet-600
                           focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-violet-600
                           transition-all active:scale-95 shadow-sm">
                Create Segment
            </button>
        </div>
    </form>
</div>
